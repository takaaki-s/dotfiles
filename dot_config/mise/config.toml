[tools]
awscli = { version = "latest", symlink_bins = "true" }
gh = "latest"
gitleaks = "latest"
go = "1.26.0"
golangci-lint = "latest"
mutagen = "latest"
node = "25.8.2"
peco = "latest"
pnpm = "10.16.1"
ruby = "3.3.9"
saml2aws = "latest"
tree-sitter = "latest"
uv = "latest"
bat = "latest"
delta = "latest"
direnv = "latest"
eza = "latest"
fd = "latest"
fzf = "latest"
neovim = "latest"
ripgrep = "latest"
tmux = "3.6a"
usage = "latest"
jq = "1.8.1"
lazygit = "0.62.2"
make = "4.4.1"
chezmoi = "latest"

[settings]
paranoid = true
minimum_release_age = "7d"
idiomatic_version_file_enable_tools = ["ruby","node"]
trusted_config_paths = [
  "~/dev",
  "~/.codex/worktrees",
  "~/.claude/worktrees"
]

[settings.ruby]
compile = false

